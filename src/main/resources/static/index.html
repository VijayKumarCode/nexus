<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Multiplayer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: 'Segue UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .screen { text-align: center; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 88%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #fff; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; border-radius: 10px; }
        #status-indicator { margin-bottom: 20px; padding: 10px; border-radius: 10px; font-size: 0.9rem; width: 100%; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="register-screen" class="screen" style="display: none;">
    <h2>Register</h2>
    <input type="text" id="reg-username" placeholder="Username">
    <input type="password" id="reg-password" placeholder="Password">
    <button class="btn-primary" onclick="register()">Create Account</button>
    <p onclick="showScreen('login-screen')" style="color: blue; cursor: pointer; font-size: 0.8rem;">Login instead</p>
</div>

<div id="login-screen" class="screen">
    <h2>Nexus Login</h2>
    <input type="text" id="login-username" placeholder="Username">
    <input type="password" id="login-password" placeholder="Password">
    <button class="btn-success" onclick="login()">Login</button>
    <p onclick="showScreen('register-screen')" style="color: blue; cursor: pointer; font-size: 0.8rem;">Create account</p>
</div>

<div id="lobby-screen" class="screen" style="display: none; width: 600px; display: flex; gap: 20px;">
    <div style="flex: 1;">
        <h2>Player Lobby</h2>
        <div id="online-users-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #eee; padding: 10px;">
            <p>Scanning for players...</p>
        </div>
        <button class="btn-danger" onclick="logout()">Logout</button>
    </div>

    <div style="flex: 0.8; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #ddd;">
        <h3 style="margin-top: 0;">🏆 Top Players</h3>
        <div id="leaderboard-list" style="font-size: 0.9rem;">
            <p>Loading rankings...</p>
        </div>
    </div>
</div>

<div id="game-container" style="display: none; text-align: center;">
    <div id="status-indicator" style="background: #eee;">Waiting for game to start...</div>
    <div class="grid" id="board">
        <div class="cell" onclick="sendMove(0)"></div>
        <div class="cell" onclick="sendMove(1)"></div>
        <div class="cell" onclick="sendMove(2)"></div>
        <div class="cell" onclick="sendMove(3)"></div>
        <div class="cell" onclick="sendMove(4)"></div>
        <div class="cell" onclick="sendMove(5)"></div>
        <div class="cell" onclick="sendMove(6)"></div>
        <div class="cell" onclick="sendMove(7)"></div>
        <div class="cell" onclick="sendMove(8)"></div>
    </div>
    <div style="margin-top: 20px;">
        <button onclick="sendToss()" style="width: auto; padding: 10px 20px;">Toss</button>
        <button class="btn-danger" onclick="sendReset()" style="width: auto; padding: 10px 20px;">Reset</button>
    </div>
</div>

<script>

    // --- 1. GLOBAL STATE ---
    let stompClient = null;
    let currentUser = "";
    let opponentUser = "";
    let currentRoomId = ""; // FIXED: This was missing, causing ReferenceErrors
    let isMyTurn = false;   // Tracks if the local player is allowed to click
    let isGameOver = false;

    const API_BASE = "http://localhost:8080/api/users";
    const statusEl = document.getElementById('status-indicator') || document.createElement('div'); // Fallback if element doesn't exist yet

    // --- SCREEN NAVIGATION ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen, #game-container').forEach(el => el.style.display = 'none');
        document.getElementById(screenId).style.display = 'block';
    }

    // --- AUTHENTICATION ---
    async function register() {
        const u = document.getElementById('reg-username').value;
        const p = document.getElementById('reg-password').value;
        const res = await fetch(`${API_BASE}/register`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        if (res.ok) { alert("Success!"); showScreen('login-screen'); }
        else { alert(await res.text()); }
    }

    async function login() {
        const u = document.getElementById('login-username').value;
        const p = document.getElementById('login-password').value;
        const res = await fetch(`${API_BASE}/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        if (res.ok) {
            currentUser = u;
            localStorage.setItem('nexus_user', u);
            showScreen('lobby-screen');
            connect();
            startLobbyRefresh();
        } else { alert("Login failed"); }
    }

    // --- LOBBY & CHALLENGE ---
    function startLobbyRefresh() {
        refreshLobby();
        refreshLeaderboard();
        setInterval(() => {
            refreshLobby();
            refreshLeaderboard();
        }, 5000);
    }

    async function refreshLeaderboard() {
        try {
            const res = await fetch('http://localhost:8080/api/users/leaderboard');
            if (!res.ok) return; // Fails silently if endpoint isn't up yet
            const topPlayers = await res.json();
            const list = document.getElementById('leaderboard-list');
            if(!list) return;

            list.innerHTML = "";
            topPlayers.forEach((player, index) => {
                list.innerHTML += `
                    <div style="display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #e9ecef;">
                        <span>${index + 1}. <strong>${player.username}</strong></span>
                        <span style="color: #28a745; font-weight: bold;">${player.wins} W</span>
                    </div>`;
            });
        } catch (err) {
            console.error("Leaderboard fetch failed", err);
        }
    }

    async function refreshLobby() {
    if (document.getElementById('lobby-screen').style.display === 'none') return;

    const res = await fetch(`${API_BASE}/lobby`);
    const users = await res.json();
    const list = document.getElementById('online-users-list');
    list.innerHTML = "";

    users.forEach(user => {
        if (user.username !== currentUser) {
            // Determine tag color based on status
            const statusColor = user.status === "ONLINE" ? "#28a745" : "#6c757d";
            const statusText = user.status === "ONLINE" ? "Online" : "Offline";

            list.innerHTML += `
                <div class="user-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee;">
                    <div>
                        <span style="font-weight: bold;">${user.username}</span>
                        <span style="margin-left: 8px; font-size: 0.8em; padding: 2px 6px; border-radius: 10px; background: ${statusColor}; color: white;">
                            ${statusText}
                        </span>
                    </div>
                    <button class="btn-success"
                            style="width:auto; padding:5px 10px;"
                            ${user.status !== "ONLINE" ? "disabled style='opacity:0.5;'" : ""}
                            onclick="sendChallenge('${user.username}')">
                        Challenge
                    </button>
                </div>`;
            }
        });
    }

    function sendChallenge(target) {
        const roomId = `${currentUser}_${target}_${Date.now()}`;
        stompClient.send("/app/challenge", {}, JSON.stringify({
            sender: currentUser,
            receiver: target,
            roomId: roomId,
            type: "CHALLENGE"
        }));
        alert("Challenge sent!");
    }

    function handleChallenge(msg) {
        if (msg.type === "CHALLENGE") {
            if (confirm(`${msg.sender} wants to play!`)) {
                currentRoomId = msg.roomId;
                opponentUser = msg.sender;
                stompClient.send("/app/challenge/reply", {}, JSON.stringify({
                    sender: msg.sender, receiver: currentUser, roomId: msg.roomId, type: "ACCEPT"
                }));
                setupGame();
            }
        } else if (msg.type === "ACCEPT") {
            currentRoomId = msg.roomId;
            opponentUser = msg.sender; // FIXED: The person who sent the ACCEPT is your opponent
            setupGame();
        }
    }

    function setupGame() {
        showScreen('game-container');
        // Subscribe ONLY to the private room.
        stompClient.subscribe(`/topic/game/${currentRoomId}`, m => showMoveOnBoard(JSON.parse(m.body)));
        statusEl.innerText = `Room: ${currentRoomId} | vs ${opponentUser}`;

        // Reset local game state
        isGameOver = false;
        isMyTurn = false;
    }

    // --- GAMEPLAY MECHANICS ---
    function sendMove(pos) {
        if (isGameOver) return;

        // FIXED: Strict Turn Enforcement
        if (!isMyTurn) {
            console.warn("It's not your turn!");
            return;
        }

        const move = {
            playerUsername: currentUser,
            boardPosition: pos,
            roomId: currentRoomId
        };

        stompClient.send(`/app/move/${currentRoomId}`, {}, JSON.stringify(move));
        isMyTurn = false; // Lock the board immediately after clicking
    }

    function showMoveOnBoard(move) {
        const cells = document.getElementsByClassName('cell');
        cells[move.boardPosition].innerText = move.symbol;

        if (move.gameState && move.gameState !== "ONGOING") {
            isGameOver = true;
            alert("Game Over: " + move.gameState);
        } else {
            // FIXED: If it's ongoing, unlock the board for the *other* player
            if (move.playerUsername !== currentUser) {
                isMyTurn = true;
            }
        }
    }

    // --- WEBSOCKETS ---
    function connect() {
        const socket = new SockJS('/game-websocket');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function() {
            stompClient.subscribe('/topic/challenges/' + currentUser, m => handleChallenge(JSON.parse(m.body)));

            // REMOVED: Global '/topic/game' subscription to prevent double-moves
            // stompClient.subscribe('/topic/game', m => showMoveOnBoard(JSON.parse(m.body)));

            stompClient.subscribe('/topic/game.system', m => handleSystemMsg(JSON.parse(m.body)));
        });
    }

    function handleSystemMsg(msg) {
        if (msg.type === "TOSS_RESULT") {
            alert(msg.message);
            // FIXED: Unlock the board only for the player who won the toss
            if (msg.payload === currentUser) {
                isMyTurn = true;
            }
        }
        if (msg.type === "GAME_RESET") resetUI();
    }

    function resetUI() {
        isGameOver = false;
        isMyTurn = false; // Wait for a new toss to decide who starts
        Array.from(document.getElementsByClassName('cell')).forEach(c => c.innerText = "");
    }

    function sendToss() {
        stompClient.send("/app/toss", {}, JSON.stringify({playerOne: currentUser, playerTwo: opponentUser}));
    }

    function sendReset() { stompClient.send("/app/reset", {}, {}); }

    async function logout() {
        await fetch(`${API_BASE}/logout/${currentUser}`, {method: 'POST'});
        localStorage.removeItem('nexus_user');
        location.reload();
    }

    window.onload = () => {
        const saved = localStorage.getItem('nexus_user');
        if (saved) {
            currentUser = saved;
            showScreen('lobby-screen');
            connect();
            startLobbyRefresh();
        }
    };
</script>
</body>
</html>
