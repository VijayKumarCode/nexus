<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Multiplayer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .screen { text-align: center; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 88%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #fff; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; border-radius: 10px; }
        #status-indicator { margin-bottom: 20px; padding: 10px; border-radius: 10px; font-size: 0.9rem; width: 100%; font-weight: bold; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="register-screen" class="screen" style="display: none;">
    <h2>Register</h2>
    <input type="text" id="reg-username" placeholder="Username">
    <input type="password" id="reg-password" placeholder="Password">
    <button class="btn-primary" onclick="register()">Create Account</button>
    <p onclick="showScreen('login-screen')" style="color: blue; cursor: pointer; font-size: 0.8rem;">Login instead</p>
</div>

<div id="login-screen" class="screen">
    <h2>Nexus Login</h2>
    <input type="text" id="login-username" placeholder="Username">
    <input type="password" id="login-password" placeholder="Password">
    <button class="btn-success" onclick="login()">Login</button>
    <p onclick="showScreen('register-screen')" style="color: blue; cursor: pointer; font-size: 0.8rem;">Create account</p>
</div>

<div id="lobby-screen" class="screen" style="display: none; width: 600px; display: flex; gap: 20px;">
    <div style="flex: 1;">
        <h2>Player Lobby</h2>
        <div id="online-users-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #eee; padding: 10px;">
            <p>Scanning for players...</p>
        </div>
        <button class="btn-danger" onclick="logout()">Logout</button>
    </div>

    <div style="flex: 0.8; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #ddd;">
        <h3 style="margin-top: 0;">🏆 Top Players</h3>
        <div id="leaderboard-list" style="font-size: 0.9rem;">
            <p>Loading rankings...</p>
        </div>
    </div>
</div>

<div id="game-container" style="display: none; text-align: center;">
    <div id="status-indicator" style="background: #eee;">Waiting for game to start...</div>
    <div class="grid" id="board">
        <div class="cell" onclick="sendMove(0)"></div>
        <div class="cell" onclick="sendMove(1)"></div>
        <div class="cell" onclick="sendMove(2)"></div>
        <div class="cell" onclick="sendMove(3)"></div>
        <div class="cell" onclick="sendMove(4)"></div>
        <div class="cell" onclick="sendMove(5)"></div>
        <div class="cell" onclick="sendMove(6)"></div>
        <div class="cell" onclick="sendMove(7)"></div>
        <div class="cell" onclick="sendMove(8)"></div>
    </div>
    <div style="margin-top: 20px;">
        <button class="btn-primary" onclick="sendToss()" style="width: auto; padding: 10px 20px;">Toss</button>
        <button class="btn-danger" onclick="sendReset()" style="width: auto; padding: 10px 20px;">Reset</button>
    </div>
</div>

<script>
    let stompClient = null;
    let currentUser = "";
    let opponentUser = "";
    let currentRoomId = "";
    let isMyTurn = false;
    let isGameOver = false;
    let roomSubscription = null;

    const API_BASE = "/api/users";
    const statusEl = document.getElementById('status-indicator');

    // --- 1. INITIALIZATION (Cleaned up duplicates) ---
    window.onload = async function() {
        const saved = localStorage.getItem('nexus_user');
        if (saved) {
            currentUser = saved;
            try {
                await fetch(`${API_BASE}/sync?username=${currentUser}`, { method: 'POST' });
                showScreen('lobby-screen');
                connect();
                startLobbyRefresh();
            } catch (err) {
                console.error("Presence sync failed:", err);
            }
        }
    };

    // --- SCREEN NAVIGATION ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen, #game-container').forEach(el => el.style.display = 'none');
        document.getElementById(screenId).style.display = 'block';
        if (screenId === 'lobby-screen') {
            document.getElementById(screenId).style.display = 'flex'; // Maintain flex layout for lobby
        }
    }

    // --- AUTHENTICATION ---
    async function register() {
        const u = document.getElementById('reg-username').value;
        const p = document.getElementById('reg-password').value;
        const res = await fetch(`${API_BASE}/register`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        if (res.ok) { alert("Success! Please login."); showScreen('login-screen'); }
        else { alert(await res.text()); }
    }

    async function login() {
        const u = document.getElementById('login-username').value;
        const p = document.getElementById('login-password').value;
        const res = await fetch(`${API_BASE}/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        if (res.ok) {
            currentUser = u;
            localStorage.setItem('nexus_user', u);
            showScreen('lobby-screen');
            connect();
            startLobbyRefresh();
        } else { alert("Login failed"); }
    }

    // --- LOBBY & LEADERBOARD ---
    function startLobbyRefresh() {
        refreshLobby();
        refreshLeaderboard();
        setInterval(() => {
            refreshLobby();
            refreshLeaderboard();
        }, 5000);
    }

    async function refreshLeaderboard() {
        try {
            const res = await fetch(`${API_BASE}/leaderboard`);
            if (!res.ok) return;
            const topPlayers = await res.json();
            const list = document.getElementById('leaderboard-list');

            let html = "";
            topPlayers.forEach((player, index) => {
                html += `
                    <div style="display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #e9ecef;">
                        <span>${index + 1}. <strong>${player.username}</strong></span>
                        <span style="color: #28a745; font-weight: bold;">${player.wins} W</span>
                    </div>`;
            });
            list.innerHTML = html || "<p>No ranked players yet.</p>";
        } catch (err) {
            console.error("Leaderboard fetch failed", err);
        }
    }



    // --- CHALLENGE LOGIC ---
    function sendChallenge(target) {
        const roomId = `${currentUser}_${target}_${Date.now()}`;
        stompClient.send("/app/challenge", {}, JSON.stringify({
            sender: currentUser,
            receiver: target,
            roomId: roomId,
            status: "PENDING"
        }));
        alert("Challenge sent to " + target);
    }

    function handleChallenge(msg) {
        if (msg.status === "PENDING") {
            if (confirm(`${msg.sender} wants to play!`)) {
                stompClient.send("/app/challenge/reply", {}, JSON.stringify({
                    sender: msg.sender,
                    receiver: currentUser,
                    roomId: msg.roomId,
                    status: "ACCEPTED"
                }));
                setupGame(msg.roomId, msg.sender);
            }
        } else if (msg.status === "ACCEPTED") {
            setupGame(msg.roomId, msg.receiver); // Sender sets up using receiver's name
        } else if (msg.status === "CANCELLED") {
            alert("The challenge was cancelled.");
        }
    }

    function setupGame(roomId, opponent) {
        currentRoomId = roomId;
        opponentUser = opponent;
        showScreen('game-container');

        // Clean up old subscriptions to avoid duplicate messages
        if (roomSubscription) roomSubscription.unsubscribe();

        // Subscribe to unified room topic for both moves and system messages
        roomSubscription = stompClient.subscribe(`/topic/game/${currentRoomId}`, m => handleRoomMessage(JSON.parse(m.body)));

        statusEl.innerText = `Room Ready | vs ${opponentUser} | Click 'Toss' to begin!`;
        clearBoardUI();
    }

   function handleRoomMessage(payload) {
        // 1. Handle System Messages (Toss/Reset)
        if (payload.type) {
            if (payload.type === "GAME_RESET") {
                clearBoardUI();
                return; // Exit early so we don't try to process boardPosition
            } else if (payload.type === "TOSS_RESULT") {
                alert(payload.message);
                if (payload.payload === currentUser) {
                    isMyTurn = true;
                    statusEl.innerText = "You won the toss! Your turn.";
                } else {
                    isMyTurn = false;
                    statusEl.innerText = `${opponentUser} won the toss. Waiting...`;
                }
                return;
            }
        }

        // 2. Handle Game Moves - Added check to ensure boardPosition is valid (0-8)
        if (payload.boardPosition !== undefined && payload.boardPosition !== null) {
            const cells = document.getElementsByClassName('cell');
            const pos = parseInt(payload.boardPosition);

            if (cells[pos]) {
                cells[pos].innerText = payload.symbol;
                cells[pos].style.color = (payload.symbol === 'X') ? '#007bff' : '#dc3545';

                if (payload.gameState && payload.gameState !== "ONGOING") {
                    isGameOver = true;
                    statusEl.innerText = `Game Over: ${payload.gameState}`;
                    setTimeout(() => alert("Game Over: " + payload.gameState), 100);
                } else if (payload.playerUsername !== currentUser) {
                    isMyTurn = true;
                    statusEl.innerText = "Your turn!";
                } else {
                    statusEl.innerText = "Waiting for opponent...";
                }
            }
        }
    }

    // FIXED: Lobby Refresh to prevent "Ghost Players" or empty lists
   async function refreshLobby() {
        const lobbyScreen = document.getElementById('lobby-screen');
        if (lobbyScreen.style.display === 'none') return;

        try {
            const res = await fetch(`${API_BASE}/lobby`);
            if (!res.ok) throw new Error("Lobby fetch failed");

            const users = await res.json();
            const list = document.getElementById('online-users-list');

            // Clear current list entirely before rebuilding
            list.innerHTML = "";

            let otherPlayersFound = false;
            users.forEach(user => {
                if (user.username !== currentUser) {
                    otherPlayersFound = true;
                    const isBusy = user.status === "IN_GAME";
                    const statusColor = isBusy ? "#dc3545" : (user.status === "ONLINE" ? "#28a745" : "#6c757d");

                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `
                        <div>
                            <span style="font-weight: bold;">${user.username}</span>
                            <span style="margin-left: 8px; font-size: 0.8em; padding: 2px 6px; border-radius: 10px; background: ${statusColor}; color: white;">
                                ${user.status}
                            </span>
                        </div>
                        <button class="btn-success"
                                style="width:auto; padding:5px 10px;"
                                ${(user.status !== "ONLINE" || isBusy) ? "disabled style='opacity:0.5;'" : ""}
                                onclick="sendChallenge('${user.username}')">
                            Challenge
                        </button>`;
                    list.appendChild(userDiv);
                }
            });

            if (!otherPlayersFound) {
                list.innerHTML = "<p>No other players online.</p>";
            }
        } catch (err) {
            console.error("Lobby refresh error:", err);
        }
   }

    // --- GAMEPLAY MECHANICS ---
   function sendMove(pos) {
        if (isGameOver) {
            alert("Game is over. Click Reset to play again.");
            return;
        }
        if (!isMyTurn) {
            console.warn("It's not your turn!");
            return;
        }

        const move = {
            playerUsername: currentUser,
            boardPosition: pos,
            roomId: currentRoomId
        };

        stompClient.send(`/app/move/${currentRoomId}`, {}, JSON.stringify(move));
        isMyTurn = false;
   }

    function sendToss() {
        if (currentRoomId) {
            stompClient.send(`/app/toss/${currentRoomId}`, {}, JSON.stringify({playerOne: currentUser, playerTwo: opponentUser}));
        }
    }

    function sendReset() {
        if (currentRoomId) {
            stompClient.send(`/app/reset/${currentRoomId}`, {}, {});
        }
    }

    function clearBoardUI() {
        isGameOver = false;
        isMyTurn = false;
        statusEl.innerText = "Board cleared. Toss to see who goes first!";
        Array.from(document.getElementsByClassName('cell')).forEach(c => {
            c.innerText = "";
            c.style.color = "";
        });
    }

    // --- CONNECTION ---
    function connect() {
        const socket = new SockJS('/game-websocket');
        stompClient = Stomp.over(socket);
        stompClient.connect({'user': currentUser}, function() {
            // Only subscribe to personal challenges queue globally
            stompClient.subscribe('/topic/challenges/' + currentUser, m => handleChallenge(JSON.parse(m.body)));
        });
    }

    async function logout() {
        await fetch(`${API_BASE}/logout/${currentUser}`, {method: 'POST'});
        localStorage.removeItem('nexus_user');
        location.reload();
    }
</script>
</body>
</html>
