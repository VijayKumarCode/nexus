spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/nexus_db
    username: postgres
    password: ${DEV_DB_PASSWORD}  # Sourced securely from your untracked local .env
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

app:
  base-url: http://localhost:8080
  resend-api-key: ${RESEND_API_KEY} # Sourced securely from your untracked local .env
  mail-from: ${MAIL_FROM:onboarding@resend.dev}

server:
  port: ${PORT:8080}

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8080