spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false

app:
  base-url: ${APP_BASE}
  mail-from: ${MAIL_FROM:noreply@nexusgame.space}

  jwt-secret: ${JWT_SECRET}

  allowed-origins:
    - ${FRONTEND_URL:https://nexusgame.space}

  resend-api-key: ${RESEND_API_KEY}

server:
  port: ${PORT:8080}

cors:
  allowed-origins:
    - ${FRONTEND_URL:https://nexusgame.space}
