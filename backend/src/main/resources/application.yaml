spring:
  application:
    name: nexus
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Optional: import dotenv from backend/.env for local dev convenience
  config:
    import: optional:dotenv:backend/.env

  jpa:
    open-in-view: false

server:
  port: ${PORT:8080}

app:
  mail:
    from: ${MAIL_FROM:onboarding@resend.dev}
  base-url: ${APP_BASE:http://localhost:8080}
  resend-api-key: ${RESEND_API_KEY:}
  jwt-secret: ${MXfmke16C+cDZ92613eAstqpIpmT7FZo73B3ALB1JVzc59z8mEmQXvQoaFbock+UEgsxMmw2JGfLL3bEZYljJw==}
  jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}

cors:
  allowed-origins:
    - ${FRONTEND_URL:http://localhost:3000}
