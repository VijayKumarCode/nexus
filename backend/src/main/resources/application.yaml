spring:
  application:
    name: nexus
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Checks both paths so it works whether running from root or inside /backend
  config:
    import:
      - optional:dotenv:.env
      - optional:dotenv:backend/.env

  jpa:
    open-in-view: false

server:
  port: ${PORT:8080}

app:
  mail-from: ${MAIL_FROM:onboarding@resend.dev}
  base-url: ${APP_BASE:http://localhost:8080}
  resend-api-key: ${RESEND_API_KEY}
  jwt-secret: ${JWT_SECRET}
  jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}

cors:
  allowed-origins:
    - ${FRONTEND_URL:http://localhost:3000}